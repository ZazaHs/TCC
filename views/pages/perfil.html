<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | ArtHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Pompiere&display=swap" rel="stylesheet">
    <!-- Adicionado Font Awesome para o ícone de câmera -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/views/css/perfil.css">
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <h1>Amnesia</h1>
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Galeria</a></li>
            <li><a href="perfil.html" class="active">Perfil</a></li>
            <li><a href="chat.html">Mensagens</a></li>
            <li><a href="comissões.html">Comissões</a></li>
            <li><a href="ajustes.html">Ajustes</a></li>
        </ul>
        <div class="nav-footer">
            <a href="cadastro.html">Sair</a>
        </div>
    </nav>

    <main class="chat-container">
        <header class="chat-header">
            <div class="user-info">
                <div>
                    <h2>Editar Perfil</h2>
                    <p>Mantenha suas informações de artista atualizadas</p>
                </div>
            </div>
        </header>

        <section class="profile-content">
            <div class="photo-section">
                <div class="profile-photo-container">
                    <!-- Preview da Foto (ID imagePreview para o JS funcionar) -->
                    <div class="photo-placeholder" id="imagePreview"></div> 
                    
                    <!-- Input de arquivo escondido -->
                    <input type='file' id="imageUpload" accept=".png, .jpg, .jpeg" style="display: none;" />
                    
                    <!-- Botão que aciona o explorador de arquivos -->
                    <label for="imageUpload" class="change-photo-btn">
                        <i class="fas fa-camera"></i> Alterar Foto
                    </label>
                </div>
                <p class="photo-hint">Recomendado: 500x500px (JPG ou PNG)</p>
            </div>

            <form class="edit-form">
                <div class="input-group">
                    <label for="username">Nome de Usuário</label>
                    <input type="text" id="username" value="SeuNomeDeArtista" placeholder="@usuario">
                </div>

                <div class="input-group">
                    <label for="bio">Bio (Biografia)</label>
                    <textarea id="bio" placeholder="Conte ao mundo sobre suas inspirações...">Sou um artista focado em arte digital e concept art...</textarea>
                </div>
                
                <div class="input-area" style="background: none; padding: 20px 0;">
                    <button type="submit" class="save-btn">Salvar Perfil</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        // Script para abrir o explorador e visualizar a imagem instantaneamente
        document.getElementById("imageUpload").onchange = function() {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Aplica a imagem escolhida ao círculo de preview
                const preview = document.getElementById("imagePreview");
                preview.style.backgroundImage = `url(${e.target.result})`;
                preview.style.backgroundSize = 'cover';
                preview.style.backgroundPosition = 'center';
            };
            reader.readAsDataURL(this.files[0]);
        };
    </script>

</body>
</html>
