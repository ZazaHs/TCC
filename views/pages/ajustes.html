</head>
<body>

    <!-- Sidebar com Links Arrumados -->
    <div class="container">
       <nav class="sidebar">
    <div class="logo">Amnesia</div>
    <ul class="nav-links">
        <li>
            <a href="/views/pages/home.html">
                <span>🏠</span> Home

        <li>
            <a href="/views/pages/pesquisa.html">

    <main class="chat-container">
        <header class="chat-header">
            <div class="user-info">
                <div>
                    <h2>Configurações Gerais</h2>
                    <p>Gerencie sua conta e preferências de estilo</p>
                </div>
            </div>
        </header>

        <section class="settings-content">
            <!-- Edição de Perfil -->
            <div class="settings-group">
                <h3>Perfil Público</h3>
                <div class="profile-edit-grid">
                    <div class="input-box">
                        <label>Nome de exibição</label>
                        <input type="text" placeholder="Seu nome artístico...">
                    </div>
                    <div class="input-box">
                        <label>Bio</label>
                        <textarea placeholder="Fale sobre você..."></textarea>
                    </div>
                </div>
            </div>

           
            
        </section>

        <footer class="input-area">
            <button class="save-btn">Salvar Alterações</button>
        </footer>
    </main>
