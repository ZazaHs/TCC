<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Pompiere&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/views/css/perfil.css">
</head>
<body>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">Amnesia</div>
            <ul class="nav-links">
                <li><a href="/views/pages/home.html"><span>🏠</span> Home</a></li>
                <li><a href="/views/pages/pesquisa.html"><span>🧭</span> Pesquisar</a></li>
                <li><a href="/views/pages/chat.html"><span>✉️</span> Mensagens</a></li>
                <li><a href="/views/pages/perfil.html" class="link-meu-perfil"><span>👤</span> Perfil</a></li>
                <li><a href="/views/pages/ajustes.html"><span>⚙️</span> Configurações</a></li>
            </ul>
        </nav>

        <main class="chat-container">
            <header class="chat-header">
                <div class="user-info">
                    <div>
                        <h2>Meu Perfil</h2>
                        <p>Gerencie sua identidade e veja suas publicações</p>
                    </div>
                </div>
            </header>

            <section class="profile-content">
                <div class="photo-section">
                    <div class="profile-photo-container">
                        <div class="photo-placeholder" id="imagePreview"></div> 
                        <input type='file' id="imageUpload" accept=".png, .jpg, .jpeg" style="display: none;" />
                        <label for="imageUpload" class="change-photo-btn">
                            <i class="fas fa-camera"></i> Alterar Foto
                        </label>
                    </div>
                    
                    <div class="stats-container" style="display: flex; gap: 25px; margin-top: 20px; justify-content: center; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #222;">
                        <div style="text-align: center;">
                            <span id="qtd-seguidores" style="font-size: 20px; font-weight: bold; color: #007bff; display: block;">0</span>
                            <small style="color: #aaa; font-size: 12px;">Seguidores</small>
                        </div>
                        <div style="text-align: center; border-left: 1px solid #333; padding-left: 25px;">
                            <span id="qtd-seguindo" style="font-size: 20px; font-weight: bold; color: #007bff; display: block;">0</span>
                            <small style="color: #aaa; font-size: 12px;">Seguindo</small>
                        </div>
                    </div>
                </div>

                <form class="edit-form" id="formEditarPerfil">
                    <div class="input-group">
                        <label for="username">Nome de Usuário</label>
                        <input type="text" id="username" placeholder="@usuario">
                    </div>

                    <div class="input-group">
                        <label for="bio">Bio (Biografia)</label>
                        <textarea id="bio" placeholder="Conte ao mundo sobre suas inspirações..."></textarea>
                    </div>
                    
                    <div class="input-area">
                        <button type="submit" class="save-btn">Salvar Alterações</button>
                    </div>
                </form>
            </section>

            <hr style="border: 0; border-top: 1px solid #222; margin: 40px 30px 20px 30px;">

            <section class="minhas-postagens-wrapper">
                <h3 style="font-size: 22px; margin-bottom: 20px; color: #fff;"><i class="fas fa-images"></i> Suas Publicações</h3>
                
                <div id="grid-meu-feed" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;">
                    <p style="color: #666;">Carregando publicações...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="image-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;">
        <span class="modal-close" style="position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer;">&times;</span>
        <img id="modal-img" style="max-width: 90%; max-height: 90%; border-radius: 8px;" alt="Zoom">
    </div>

    <script src="../js/perfil.js"></script>
</body>
</html>
