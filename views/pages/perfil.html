<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <!-- Importando ícones do Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="stylesheet" href="/views/css/perfil.css">
</head>
<body>

<div class="profile-card">
    <h2>Editar Perfil</h2>
    
    <!-- Upload de Foto -->
    <div class="avatar-upload">
        <div class="avatar-edit">
            <input type='file' id="imageUpload" accept=".png, .jpg, .jpeg" />
            <label for="imageUpload"><i class="fas fa-camera"></i></label>
        </div>
        <div class="avatar-preview" id="imagePreview">
        </div>
    </div>

    <!-- Campos do Perfil -->
    <form>
        <div class="input-group">
            <label for="username">Nome de Usuário</label>
            <input type="text" id="username" placeholder="@seu_arroba">
        </div>

        <div class="input-group">
            <label for="bio">Biografia</label>
            <textarea id="bio" placeholder="Conte um pouco sobre você..."></textarea>
        </div>

        <button type="submit" class="btn-save">Salvar Alterações</button>
    </form>
</div>

<script>
    // Script simples para visualizar a imagem antes de salvar
    document.getElementById("imageUpload").onchange = function() {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById("imagePreview").style.backgroundImage = `url(${e.target.result})`;
        };
        reader.readAsDataURL(this.files[0]);
    };
</script>

</body>
</html>
