<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amnesia</title>
    <link rel="stylesheet" href="/views/css/home.css">
    <script src="/views/js/home.js"></script>
</head>

<body>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">Amnesia</div>
            <ul class="nav-links">
                <li>
                    <a href="/views/pages/home.html">
                        <span>🏠</span> Home
                    </a>
                </li>
                <li>
                    <a href="/views/pages/pesquisar.html">
                        <span>🧭</span> Pesquisar
                    </a>
                </li>
                <li>
                    <a href="/views/pages/chat.html">
                        <span>✉️</span> Mensagens
                    </a>
                </li>
                <li>
                    <a href="/views/pages/perfil.html">
                        <span>👤</span> Perfil
                    </a>
                </li>
                <li>
                    <a href="/views/pages/ajustes.html">
                        <span>⚙️</span> Configurações
                    </a>
                </li>
            </ul>
        </nav>

        <main class="feed-container">

            <section class="create-post-box">
                <h3>Criar Nova Publicação</h3>
                <form id="form-novo-post">
                    <textarea id="post-legenda" placeholder="Escreva uma legenda ou título..." required></textarea>
                    <input type="url" id="post-url-imagem" placeholder="Cole a URL de uma imagem da internet..."
                        required>
                    <button type="submit" class="btn-enviar">Publicar</button>
                </form>
            </section>

            <section id="feed-posts">
            </section>

        </main>
    </div>

    <script>
    // Captura o ID da URL da Home e salva na memória para as outras páginas usarem
    const urlParams = new URLSearchParams(window.location.search);
    const idUrl = urlParams.get('id');
    if (idUrl) {
        sessionStorage.setItem('idArtistaLogado', idUrl);
    }


    
</script>


</body>

</html>
