<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Chat | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Pompiere&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/views/css/chat.css">
    <script src="/views/js/chat.js" defer></script>
</head>
<body>

    <div class="container">
        <nav class="sidebar">
            <div class="logo">Amnesia</div>
            <ul class="nav-links">
                <li><a href="/views/pages/home.html"><span>🏠</span> Home</a></li>
                <li><a href="/views/pages/pesquisa.html"><span>🧭</span> Pesquisar</a></li>
                <li><a href="/views/pages/chat.html"><span>✉️</span> Mensagens</a></li>
                <li><a href="/views/pages/perfil.html"><span>👤</span> Perfil</a></li>
                <li><a href="/views/pages/ajustes.html"><span>⚙️</span> Configurações</a></li>
            </ul>
        </nav>

        <aside class="chat-sidebar" style="width: 280px; background: #1a1a1a; border-right: 1px solid #333; padding: 15px; overflow-y: auto;">
            <h3 style="color: #fff; margin-bottom: 15px; font-family: 'Pompiere', sans-serif; font-size: 24px;">Conversas</h3>
            <div id="lista-contatos" style="display: flex; flex-direction: column; gap: 10px;">
                <p style="color: #888; font-size: 14px;">Carregando artistas...</p>
            </div>
        </aside>

        <main class="chat-container" id="janela-chat-ativa" style="display: none; flex: 1; flex-direction: column;">
            <header class="chat-header">
                <div class="user-info">
                    <img id="conversa-foto" src="" alt="" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; display: none;">
                    <div>
                        <h2 id="conversa-nome">Selecione um contato</h2>
                        <p id="conversa-bio"></p>
                    </div>
                </div>
            </header>

            <section class="chat-window" id="chat-mensagens">
            </section>

     <footer class="input-area">
                <button type="button" class="action-btn" id="btn-anexar-foto">+</button> 
                
                <input type="file" id="foto-input" accept="image/*" style="display: none;">
                <input type="text" id="mensagem-input" placeholder="Escreva sua mensagem">
                <button class="send-btn" id="btn-enviar-mensagem">Enviar</button>
            </footer>
        </main>

        <div id="chat-vazio" style="flex: 1; display: flex; align-items: center; justify-content: center; color: #888;">
            <p style="font-size: 18px;">Selecione um artista na lista ao lado para conversar</p>
        </div>
    </div>


        <div id="modal-imagem" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; gap: 15px;">
        <span id="fechar-modal" style="position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; transition: 0.3s;">&times;</span>
        
        <img id="imagem-expandida" style="max-width: 85%; max-height: 75%; border-radius: 8px; object-fit: contain; box-shadow: 0 4px 20px rgba(0,0,0,0.8);">
        
        <a id="btn-baixar-imagem" download="imagem-amnesia.png" style="padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-family: sans-serif; transition: 0.2s; cursor: pointer;">
            📥 Baixar Imagem
        </a>
    </div>

    <script>
        window.addEventListener('beforeunload', () => {
            sessionStorage.removeItem('idConversaAtiva');
        });
    </script>


</body>
</html>
