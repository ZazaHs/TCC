<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista | Amnesia</title>
    <link rel="stylesheet" href="/views/css/home.css"> 
    <script src="/views/js/perfil-publico.js" defer></script>
</head>
<body>
    <div class="container" style="display: flex;">
        <nav class="sidebar">
            <div class="logo">Amnesia</div>
            <ul class="nav-links">
                <li><a href="/views/pages/home.html"><span>🏠</span> Home</a></li>
                <li><a href="/views/pages/pesquisa.html"><span>🧭</span> Pesquisar</a></li>
                <li><a href="/views/pages/chat.html"><span>✉️</span> Mensagens</a></li>
                <li><a href="/views/pages/perfil.html"><span>👤</span> Perfil</a></li>
            </ul>
        </nav>

        <main class="perfil-container" style="flex: 1; padding: 30px; color: #fff;">
            <div class="perfil-header" style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                <img id="artista-foto" src="" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #222;">
                <div>
                    <h2 id="artista-nome" style="font-size: 28px; margin-bottom: 5px;">Carregando...</h2>
                    <p id="artista-bio" style="color: #aaa; margin-bottom: 10px;"></p>
                    
                    <div class="perfil-status" style="display: flex; gap: 20px; margin-bottom: 15px; font-size: 15px;">
                        <span><strong id="qtd-seguidores" style="color: #fff;">0</strong> seguidores</span>
                        <span><strong id="qtd-seguindo" style="color: #fff;">0</strong> seguindo</span>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button id="btn-seguir" style="padding: 8px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; background: #fff; color: #000;">Seguir</button>
                        <button id="btn-mensagem" style="padding: 8px 20px; border-radius: 20px; border: 1px solid #555; font-weight: bold; cursor: pointer; background: transparent; color: #fff; display: none;">✉️ Enviar Mensagem</button>
                    </div>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin-bottom: 20px;">
            <h3>Publicações</h3>
            
            <div id="feed-artista" style="margin-top: 20px;"></div>
        </main>
    </div>
</body>
</html>
